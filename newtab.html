<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meridian</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="app">
    <div id="search-zone">
      <div id="search-bar"></div>
    </div>
    <div id="workspace-container"></div>
    <div id="new-group-drop-zone" class="hidden" aria-label="Drop tab here to create a new group">Drop a tab here to create a new group</div>
    <div id="settings-overlay" class="hidden">
      <div id="settings-panel"></div>
    </div>
    <div id="tab-lightbox" class="hidden" aria-label="Tab preview">
      <div class="lightbox-media">
        <img id="lightbox-thumbnail" class="lightbox-thumbnail" alt="" />
        <div id="lightbox-placeholder" class="lightbox-placeholder hidden"></div>
      </div>
      <div class="lightbox-body">
        <p id="lightbox-title" class="lightbox-title"></p>
        <div class="lightbox-meta">
          <img id="lightbox-favicon" class="lightbox-favicon" alt="" />
          <span id="lightbox-url" class="lightbox-url"></span>
        </div>
      </div>
    </div>
    <button id="new-group-btn" type="button" aria-label="New group">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="11" x2="12" y2="17"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
      </svg>
    </button>
    <button id="settings-btn" type="button" aria-label="Open settings">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.33.07-.66.07-1s-.03-.68-.07-1l2.16-1.68c.19-.15.24-.42.12-.64l-2.05-3.55c-.12-.22-.39-.3-.61-.22l-2.55 1.03c-.52-.4-1.08-.73-1.69-.98l-.38-2.71C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.71c-.61.25-1.17.58-1.69.98L4.89 5.08c-.23-.09-.49 0-.61.22L2.23 8.85c-.13.22-.07.49.12.64L4.51 11.17c-.04.33-.07.66-.07 1s.03.68.07 1l-2.16 1.68c-.19.15-.24.42-.12.64l2.05 3.55c.12.22.39.3.61.22l2.55-1.03c.52.4 1.08.73 1.69.98l.38 2.71c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.71c.61-.25 1.17-.58 1.69-.98l2.55 1.03c.23.09.49 0 .61-.22l2.05-3.55c.13-.22.07-.49-.12-.64l-2.16-1.68z"/>
      </svg>
    </button>
  </div>
  <script type="module" src="newtab.js"></script>
</body>
</html>
