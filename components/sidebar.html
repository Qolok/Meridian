<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Meridian</title>
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <div id="sidebar-wrap">

      <div id="search-zone">
        <button id="meridian-btn" type="button" title="Open Meridian">
          <img id="sidebar-logo" alt="Meridian" width="20" height="20" />
        </button>
        <input
          id="search-input"
          type="text"
          placeholder="Search…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div id="tab-list"></div>

      <div id="sidebar-footer">
        <button id="new-tab-btn" type="button" title="New Tab">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="8" y1="2" x2="8" y2="14" />
            <line x1="2" y1="8" x2="14" y2="8" />
          </svg>
          <span id="new-tab-label">New Tab</span>
        </button>
      </div>

    </div>
    <script type="module" src="sidebar.js"></script>
  </body>
</html>
